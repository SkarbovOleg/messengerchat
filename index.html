<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой мессенджер</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #messages { height: 70vh; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; background: #f9f9f9; }
        .message { margin-bottom: 10px; padding: 5px 10px; border-radius: 10px; width: fit-content; max-width: 80%; }
        .my-message { background-color: #dcf8c6; margin-left: auto; }
        .other-message { background-color: #fff; border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">💬 Мой чат</h1>
        <div id="messages" class="d-flex flex-column"></div>
        <div class="input-group mt-3">
            <input type="text" id="messageInput" class="form-control" placeholder="Введите сообщение..." autofocus>
            <button class="btn btn-primary" id="sendButton">Отправить</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // 🔥 ВСТАВЬ СВОЮ КОНФИГУРАЦИЮ СЮДА
        const firebaseConfig = {
            apiKey: "AIzaSyCsLl9HXoauEKn5dBMCioT2OoHkJ_8IECg",
            authDomain: "my-simple-chat-cc22e.firebaseapp.com",
            databaseURL: "https://my-simple-chat-cc22e-default-rtdb.firebaseio.com",
            projectId: "my-simple-chat-cc22e",
            storageBucket: "my-simple-chat-cc22e.firebasestorage.app",
            messagingSenderId: "399768373584",
            appId: "1:399768373584:web:f2b42157ac87c1c69d4455"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;
            messagesRef.push({ text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
            messageInput.value = '';
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        messagesRef.orderByChild('timestamp').on('child_added', (snapshot) => {
            const message = snapshot.val();
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'other-message');
            messageElement.textContent = message.text;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
